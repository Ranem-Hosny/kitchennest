<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم تأكيد الطلب — بيت العوضي</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🍳</text></svg>">
</head>
<body>

<div id="siteHeader"></div>

<section class="section">
  <div class="container">
    <div class="order-confirm" id="orderConfirmContent">
      <!-- Rendered by JS -->
    </div>
  </div>
</section>

<div id="siteFooter"></div>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/products-sync.js"></script>
<script src="js/utils.js"></script>
<script src="js/cart.js"></script>
<script src="js/favorites.js"></script>
<script src="js/components.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('orderConfirmContent');
  let order;
  try { order = JSON.parse(sessionStorage.getItem('kn_last_order')); } catch { order = null; }

  if (!order) {
    el.innerHTML = `
      <div class="order-confirm__icon" style="background:linear-gradient(135deg,var(--primary),var(--primary-dark))"><i class="fa-solid fa-utensils"></i></div>
      <h1 class="order-confirm__title">شكراً لك!</h1>
      <p class="order-confirm__subtitle">تم استلام طلبك بنجاح. سيتواصل معك فريقنا قريباً لتأكيد التفاصيل.</p>
      <div class="order-confirm__btns">
        <a href="index.html" class="btn btn--primary btn--lg">متابعة التسوق</a>
      </div>`;
    return;
  }

  document.title = `طلب رقم #${order.orderNum} مؤكد — بيت العوضي`;

  el.innerHTML = `
    <div class="order-confirm__icon"><i class="fa-solid fa-check"></i></div>
    <h1 class="order-confirm__title">تم تأكيد طلبك! <i class="fa-solid fa-party-horn"></i></h1>
    <p class="order-confirm__subtitle">
      شكراً <strong>${order.name}</strong>! تم استلام طلبك وتسجيله بنجاح.
      سنتواصل معك هاتفياً لتأكيد تفاصيل التوصيل.
    </p>
    <div class="order-confirm__num">طلب رقم #${order.orderNum}</div>

    <div class="order-confirm__detail">
      <h3><i class="fa-solid fa-box"></i> ملخص الطلب</h3>
      ${order.items.map(i => `
        <div class="order-confirm__row">
          <span class="order-confirm__label">${i.name} × ${i.qty}</span>
          <span class="order-confirm__value">${formatPrice(i.price * i.qty)}</span>
        </div>`).join('')}
      <div class="order-confirm__row">
        <span class="order-confirm__label">المجموع الفرعي</span><span class="order-confirm__value">${formatPrice(order.subtotal)}</span>
      </div>
      <div class="order-confirm__row">
        <span class="order-confirm__label">الشحن</span>
        <span class="order-confirm__value">${order.shipping > 0 ? formatPrice(order.shipping) : 'مجاني (استلام)'}</span>
      </div>
      <div class="order-confirm__row order-confirm__row--total">
        <span class="order-confirm__label">الإجمالي المدفوع</span><span class="order-confirm__value">${formatPrice(order.total)}</span>
      </div>
    </div>

    <div class="order-confirm__detail" style="margin-bottom:32px">
      <h3><i class="fa-solid fa-location-dot"></i> تفاصيل التوصيل</h3>
      <div class="order-confirm__row"><span class="order-confirm__label">الاسم</span><span class="order-confirm__value">${order.name}</span></div>
      <div class="order-confirm__row"><span class="order-confirm__label">الهاتف</span><span class="order-confirm__value">${order.phone}</span></div>
      <div class="order-confirm__row"><span class="order-confirm__label">المدينة</span><span class="order-confirm__value">${order.city}</span></div>
      <div class="order-confirm__row"><span class="order-confirm__label">المنطقة</span><span class="order-confirm__value">${order.area}</span></div>
      <div class="order-confirm__row"><span class="order-confirm__label">العنوان</span><span class="order-confirm__value order-confirm__value--addr">${order.address}</span></div>
      <div class="order-confirm__row"><span class="order-confirm__label">طريقة الاستلام</span><span class="order-confirm__value">${order.deliveryMethod === 'delivery' ? '<i class="fa-solid fa-truck-fast"></i> توصيل للمنزل' : '<i class="fa-solid fa-store"></i> استلام من المتجر'}</span></div>
      ${order.notes ? `<div class="order-confirm__row"><span class="order-confirm__label">الملاحظات</span><span class="order-confirm__value">${order.notes}</span></div>` : ''}
      <div class="order-confirm__row"><span class="order-confirm__label">التاريخ</span><span class="order-confirm__value">${order.orderDate}</span></div>
    </div>

    <div class="order-confirm__note">
      <strong><i class="fa-solid fa-circle-check"></i> ما الخطوة التالية؟</strong><br>
      تم تسجيل طلبك لدينا. سيتصل بك فريقنا هاتفياً على <strong>${order.phone}</strong>
      لتأكيد الطلب وترتيب موعد التوصيل — عادةً خلال 1-3 ساعات في أوقات العمل.
    </div>

    <div class="order-confirm__btns">
      <a href="index.html" class="btn btn--primary btn--lg"><i class="fa-solid fa-bag-shopping"></i> متابعة التسوق</a>
    </div>`;
});
</script>
</body>
</html>
