<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تم تأكيد الطلب — بيت العوضي</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🍳</text></svg>">
</head>
<body>

<div id="siteHeader"></div>

<section class="section">
  <div class="container">
    <div class="order-confirm" id="orderConfirmContent">
      <!-- Rendered by JS -->
    </div>
  </div>
</section>

<div id="siteFooter"></div>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/products-sync.js"></script>
<script src="js/utils.js"></script>
<script src="js/cart.js"></script>
<script src="js/favorites.js"></script>
<script src="js/components.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const el = document.getElementById('orderConfirmContent');
  let order;
  try { order = JSON.parse(sessionStorage.getItem('kn_last_order')); } catch { order = null; }

  if (!order) {
    el.innerHTML = `
      <div class="order-confirm__icon" style="background:linear-gradient(135deg,var(--primary),var(--primary-dark))"><i class="fa-solid fa-utensils"></i></div>
      <h1 class="order-confirm__title">شكراً لك!</h1>
      <p class="order-confirm__subtitle">تم استلام طلبك بنجاح. سيتواصل معك فريقنا قريباً لتأكيد التفاصيل.</p>
      <div class="order-confirm__btns">
        <a href="index.html" class="btn btn--primary btn--lg">متابعة التسوق</a>
        <a href="https://wa.me/${CONFIG.whatsappNumber}" target="_blank" class="btn btn--wa btn--lg">تواصل عبر واتساب</a>
      </div>`;
    return;
  }

  document.title = `طلب رقم #${order.orderNum} مؤكد — بيت العوضي`;

  el.innerHTML = `
    <div class="order-confirm__icon"><i class="fa-solid fa-check"></i></div>
    <h1 class="order-confirm__title">تم تأكيد طلبك! <i class="fa-solid fa-party-horn"></i></h1>
    <p class="order-confirm__subtitle">
      شكراً <strong>${order.name}</strong>! تم استلام طلبك بنجاح.
      سنتواصل معك قريباً لتأكيد تفاصيل التوصيل.
    </p>
    <div class="order-confirm__num">طلب رقم #${order.orderNum}</div>

    <div class="order-confirm__detail">
      <h3></i> ملخص الطلب <i class="fa-solid fa-box"></h3>
      ${order.items.map(i => `
        <div class="order-confirm__row">
          <span>${i.name} × ${i.qty}</span>
          <span>${formatPrice(i.price * i.qty)}</span>
        </div>`).join('')}
      <div class="order-confirm__row">
        <span>المجموع الفرعي</span><span>${formatPrice(order.subtotal)}</span>
      </div>
      <div class="order-confirm__row">
        <span>الشحن</span>
        <span>${order.shipping > 0 ? formatPrice(order.shipping) : 'مجاني (استلام)'}</span>
      </div>
      <div class="order-confirm__row" style="font-weight:700;font-size:16px;color:var(--primary)">
        <span>الإجمالي المدفوع</span><span>${formatPrice(order.total)}</span>
      </div>
    </div>

    <div class="order-confirm__detail" style="margin-bottom:32px">
      <h3>تفاصيل التوصيل <i class="fa-solid fa-location-dot"></i></h3>
      <div class="order-confirm__row"><span>الاسم</span><span>${order.name}</span></div>
      <div class="order-confirm__row"><span>الهاتف</span><span>${order.phone}</span></div>
      <div class="order-confirm__row"><span>واتساب</span><span>${order.whatsapp}</span></div>
      <div class="order-confirm__row"><span>المدينة</span><span>${order.city}</span></div>
      <div class="order-confirm__row"><span>المنطقة</span><span>${order.area}</span></div>
      <div class="order-confirm__row"><span>العنوان</span><span style="text-align:right;max-width:280px">${order.address}</span></div>
      <div class="order-confirm__row"><span>طريقة الاستلام</span><span>${order.deliveryMethod === 'delivery' ? '<i class="fa-solid fa-truck-fast"></i> توصيل للمنزل' : '<i class="fa-solid fa-store"></i> استلام'}</span></div>
      ${order.notes ? `<div class="order-confirm__row"><span>الملاحظات</span><span>${order.notes}</span></div>` : ''}
      <div class="order-confirm__row"><span>التاريخ</span><span>${order.orderDate}</span></div>
    </div>

    <div style="background:var(--primary-pale);border-radius:var(--radius-md);padding:20px;margin-bottom:32px;font-size:14px;color:var(--text-secondary)">
      <strong><i class="fa-solid fa-phone"></i> ما الذي سيحدث بعد ذلك؟</strong><br>
      سيتواصل معك فريقنا على واتساب <strong>${order.whatsapp}</strong> لتأكيد طلبك وترتيب التوصيل.
      عادةً خلال 1-3 ساعات أثناء ساعات العمل. تحب تسرّع الأمر؟ تقدر تراسلنا دلوقتي بنفسك.
    </div>

    <div class="order-confirm__btns">
      <a href="index.html" class="btn btn--outline btn--lg"><i class="fa-solid fa-bag-shopping"></i> متابعة التسوق</a>
      <a href="https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(order.waMsg || `مرحباً! لقد أرسلت طلب رقم #${order.orderNum}. هل يمكنك التأكيد؟`)}"
         target="_blank" class="btn btn--wa btn--lg">
        <i class="fa-brands fa-whatsapp"></i> راسلنا الآن (اختياري)
      </a>
    </div>`;
});
</script>
</body>
</html>
