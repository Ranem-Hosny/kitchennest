<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سلة التسوق — بيت العوضي</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg'><text y='32' font-size='32'>🍳</text></svg>">
</head>
<body>

<div id="siteHeader"></div>

<div class="page-header">
  <div class="container">
    <h1>سلة التسوق</h1>
    <div class="breadcrumb">
      <a href="index.html">الرئيسية</a>
      <span class="breadcrumb__sep">›</span>
      <span>السلة</span>
    </div>
  </div>
</div>

<section class="section">
  <div class="container" id="cartContainer">
    <!-- Rendered by cart-page.js -->
  </div>
</section>

<div id="siteFooter"></div>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/products-sync.js"></script>
<script src="js/utils.js"></script>
<script src="js/cart.js"></script>
<script src="js/favorites.js"></script>
<script src="js/components.js"></script>
<script>
function renderCartPage() {
  const container = document.getElementById('cartContainer');
  const items = CART.getItems();

  if (items.length === 0) {
    container.innerHTML = `
      <div class="cart-empty">
        <div class="cart-empty__icon"><i class="fa-solid fa-cart-shopping"></i></div>
        <h2 class="cart-empty__title">سلتك فارغة</h2>
        <p class="cart-empty__sub">لم تضف أي منتجات بعد. ابدأ التسوق!</p>
        <a href="category.html" class="btn btn--primary btn--lg">تصفح المنتجات</a>
      </div>`;
    return;
  }

  const subtotal = CART.subtotal();
  const shipping = CONFIG.shippingFee;
  const total = subtotal + shipping;

  container.innerHTML = `
    <div class="cart-layout">
      <div>
        <div class="cart-table">
          <div class="cart-table__header">
            <span>المنتج</span>
            <span>السعر</span>
            <span>الكمية</span>
            <span>الإجمالي</span>
            <span></span>
          </div>
          <div id="cartItems"></div>
        </div>
        <div style="margin-top:16px;display:flex;gap:12px;justify-content:space-between;flex-wrap:wrap">
          <a href="category.html" class="btn btn--outline">
            <i class="fa-solid fa-chevron-right"></i>
            متابعة التسوق
          </a>
          <button class="btn btn--outline" style="color:var(--danger);border-color:var(--danger)" onclick="clearCart()">
            <i class="fa-solid fa-trash"></i> مسح السلة
          </button>
        </div>
      </div>

      <div class="cart-summary">
        <div class="cart-summary__title">ملخص الطلب</div>
        <div class="cart-summary__row"><span>المجموع الفرعي (${items.reduce((s,i)=>s+i.qty,0)} منتج)</span><span>${formatPrice(subtotal)}</span></div>
        <div class="cart-summary__row"><span>رسوم الشحن</span><span id="shippingDisplay">${formatPrice(shipping)}</span></div>
        <div class="cart-summary__row" style="font-size:16px">
          <span>الإجمالي الكلي</span>
          <span class="cart-summary__total" id="totalDisplay">${formatPrice(total)}</span>
        </div>
        <a href="checkout.html" class="btn btn--primary btn--full" style="margin-top:20px;padding:14px">
          المتابعة للدفع
          <i class="fa-solid fa-chevron-left"></i>
        </a>
        <div style="margin-top:16px;padding:12px;background:var(--primary-pale);border-radius:var(--radius-sm);font-size:13px;color:var(--text-secondary);text-align:center">
          <i class="fa-solid fa-shield-halved"></i> دفع آمن عبر إنستاباي + تأكيد واتساب
        </div>
        <div style="margin-top:12px">
          <a href="https://wa.me/${CONFIG.whatsappNumber}" target="_blank" class="btn btn--wa btn--full btn--sm" id="waCartBtn">
            <i class="fa-brands fa-whatsapp"></i> اطلب عبر واتساب مباشرة
          </a>
        </div>
      </div>
    </div>`;

  document.getElementById('cartItems').innerHTML = items.map(item => `
    <div class="cart-item" id="cart-item-${item.id}">
      <div class="cart-item__product">
        <img src="${item.image}" alt="${item.name}" class="cart-item__img"
             onerror="this.src='https://placehold.co/80x64/f5f5f5/999?text=+'">
        <div>
          <div class="cart-item__name">${item.name}</div>
          <div class="cart-item__cat">${CATEGORIES.find(c=>c.id===item.category)?.name || ''}</div>
        </div>
      </div>
      <div class="cart-item__price">${formatPrice(item.price)}</div>
      <div>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(${item.id}, ${item.qty - 1})">−</button>
          <input type="number" class="qty-input" value="${item.qty}" min="1" max="99"
                 onchange="changeQty(${item.id}, parseInt(this.value))">
          <button class="qty-btn" onclick="changeQty(${item.id}, ${item.qty + 1})">+</button>
        </div>
      </div>
      <div class="cart-item__subtotal">${formatPrice(item.price * item.qty)}</div>
      <button class="cart-item__remove" onclick="removeItem(${item.id})" title="إزالة">
        <i class="fa-solid fa-trash"></i>
      </button>
    </div>`).join('');

  const waCartBtn = document.getElementById('waCartBtn');
  if (waCartBtn) {
    const msg = `مرحباً ${CONFIG.storeName}! أود طلب:\n\n` +
      items.map(i => `• ${i.name} × ${i.qty} = ${formatPrice(i.price * i.qty)}`).join('\n') +
      `\n\nالمجموع الفرعي: ${formatPrice(subtotal)}\nالشحن: ${formatPrice(shipping)}\nالإجمالي: ${formatPrice(total)}`;
    waCartBtn.href = `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(msg)}`;
  }
}

function changeQty(id, qty) {
  if (qty < 1) { removeItem(id); return; }
  CART.updateQty(id, qty);
  renderCartPage();
}

function removeItem(id) {
  CART.remove(id);
  showToast('تمت إزالة المنتج من السلة', 'info');
  renderCartPage();
}

function clearCart() {
  if (confirm('هل تريد مسح السلة بالكامل؟')) {
    CART.clear();
    renderCartPage();
  }
}

document.addEventListener('DOMContentLoaded', renderCartPage);
</script>
</body>
</html>
